name: 'ecommerce_pipeline'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_pipeline'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ecommerce_pipeline:
    raw:
      +schema: raw
      +materialized: view
      +tags: ["raw"]
    staging:
      +schema: staging
      +materialized: view
      +tags: ["staging"]
    marts:
      +schema: marts
      +materialized: table
      +tags: ["marts"]

seeds:
  ecommerce_pipeline:
    +schema: raw_seeds

vars:
  start_date: '2023-01-01'
  end_date: '2024-12-31'
